site_name: Sol-Engine Documentation
site_description: Agent-native full-stack acceleration for video-diffusion inference
site_author: Sol-Engine Team
site_url: https://lyttttt3333.github.io/sol-infer/
repo_url: https://github.com/lyttttt3333/sol-infer
repo_name: lyttttt3333/sol-infer
docs_dir: site_docs

theme:
  name: material
  logo: assets/sol-engine-logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-night, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-sunny, name: Light mode }
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc: { permalink: true }
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Optimization pipelines: pipelines.md
  - Acceleration methods: acceleration.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lyttttt3333/sol-infer
  generator: false

copyright: Copyright &copy; 2026 Sol-Engine Team
